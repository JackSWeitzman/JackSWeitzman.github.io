<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Catalogue</title>
</head>
<body>
    <h1>
        Item Catalogue
    </h1>
    <form action="process-form.php" method="post">


        <label for="itemName">Name</label>
        <input required type="text" id="itemName" name="itemName">


        <label for="itemCost">Cost</label>
        <input required type="number" id="itemCost" name="itemCost">


        <fieldset>
            <legend>Rarity</legend>
        <label>
        <input type="radio" name="rarity" value="Common" checked>
        Common
        </label>
    </br>
        <label>
        <input type="radio" name="rarity" value="Uncommon">
        Uncommon
        </label>
    </br>
        <label>
        <input type="radio" name="rarity" value="Rare">
        Rare
        </label>
    </br>
        <label>
        <input type="radio" name="rarity" value="Very Rare">
        Very Rare
        </label>
    </br>
        <label>
        <input type="radio" name="rarity" value="Legendary">
        Legendary
        </label>
    </br>
        <label>
        <input type="radio" name="rarity" value="Artifact">
        Artifact
        </label>
        </fieldset>


        <fieldset>
            <legend>Cursed</legend>
        <label>
        <input type="radio" name="cursed" value="1" checked>
        Cursed Item
        </label>
    </br>
        <label>
        <input selected type="radio" name="cursed" value="0">
        Normal Item 
        </label>
        </fieldset>

    
        <label for="equippedSlot">Equipped Slot</label>
        <select required id="equippedSlot" name="equippedSlot">
            <option value="Helmet">Helmet</option>
            <option value="Armor">Armor</option>
            <option value="Boots">Boots</option>
            <option value="Amulet">Amulet</option>
            <option value="Ring">Ring</option>
            <option value="Cloak">Cloak</option>
            <option value="Weapon">Weapon</option>
            <option value="Tool">Tool</option>
            <option value="Potion">Potion</option>
            <option value="Bag">Bag</option>
            <option value="Trinket">Trinket</option>
            <option value="Trinket">Other</option>
        </select>
    
        
        <label for="charges">Charges</label>
        <input type="number" id="charges" name="charges">


        <label for="rechargeTime">Recharge Time</label>
        <input type="text" id="rechargeTime" name="rechargeTime">


        <label for="description">Item Description</label>
        <textarea required id="description" name="description"></textarea>


        <label for="gimmick">Item Gimmick</label>
        <textarea id="gimmick" name="gimmick"></textarea>


        <label for="quantity">Quantity</label>
        <input required type="number" id="quantity" name="quantity">


    </br>


    <button>Add Item</button>


    </form>
</body>
</html>
